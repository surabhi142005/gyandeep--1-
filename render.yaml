previewsEnabled: false

services:
  - type: web
    name: gyandeep-backend
    env: node
    region: oregon
    buildCommand: npm install --legacy-peer-deps
    startCommand: node server/index.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3001
      - key: MONGODB_URI
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: JWT_REFRESH_SECRET
        sync: false