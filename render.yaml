previewsEnabled: false

services:
  - type: web
    name: gyandeep-backend
    env: node
    region: oregon
    buildCommand: npm install --legacy-peer-deps && npm run build
    startCommand: node server/index.js
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: MONGODB_URI
        sync: false
      - key: MONGODB_DB
        value: gyandeep
      - key: JWT_SECRET
        sync: false
      - key: JWT_REFRESH_SECRET
        sync: false
      - key: SESSION_SECRET
        sync: false
      - key: REDIS_URL
        sync: false
      - key: UPSTASH_REDIS_REST_URL
        sync: false
      - key: UPSTASH_REDIS_REST_TOKEN
        sync: false
      - key: RESEND_API_KEY
        sync: false
      - key: EMAIL_FROM
        value: Gyandeep <noreply@gyandeep.edu>
      - key: ADMIN_EMAIL
        value: admin@gyandeep.edu
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_SECRET
        sync: false
      - key: RENDER_EXTERNAL_URL
        fromService:
          type: web
          name: gyandeep-backend
          envVarKey: RENDER_EXTERNAL_URL
      - key: VITE_APP_URL
        value: https://gyandeep.edu
      - key: API_URL
        value: https://gyandeep-backend.onrender.com
      - key: ALLOWED_ORIGINS
        value: https://gyandeep.edu
      - key: OPENAI_API_KEY
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: CLOUDINARY_CLOUD_NAME
        sync: false
      - key: CLOUDINARY_API_KEY
        sync: false
      - key: CLOUDINARY_API_SECRET
        sync: false
      - key: AWS_ACCESS_KEY_ID
        sync: false
      - key: AWS_SECRET_ACCESS_KEY
        sync: false
      - key: AWS_BUCKET_NAME
        value: gyandeep-assets
      - key: AWS_REGION
        value: us-east-1