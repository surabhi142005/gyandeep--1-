previewsEnabled: false

services:
  - type: web
    name: gyandeep-backend
    env: node
    region: oregon
    buildCommand: npm install --legacy-peer-deps && npm run build
    startCommand: node server/index.js
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: MONGODB_URI
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: JWT_REFRESH_SECRET
        sync: false