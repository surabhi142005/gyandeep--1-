databaseApiVersion: '3'
services:
  - name: gyandeep-api
    env: node
    region: oregon
    plan: free
    buildCommand: npm install && npm run build
    startCommand: node server/production.js
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: MONGODB_URI
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: JWT_REFRESH_SECRET
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: ALLOWED_ORIGINS
        value: https://gyandeep.vercel.app
      - key: FRONTEND_URL
        value: https://gyandeep.vercel.app
