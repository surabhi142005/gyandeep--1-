previewsEnabled: false

services:
  - type: web
    name: gyandeep
    env: node
    region: oregon
    buildCommand: npm install && npm run build
    startCommand: node server/index.js
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: VITE_API_URL
        value: https://gyandeep.onrender.com
      - key: ALLOWED_ORIGINS
        value: https://gyandeep.onrender.com
      - key: API_URL
        value: https://gyandeep.onrender.com
      - key: MONGODB_URI
        sync: false
      - key: MONGODB_DB
        value: gyandeep
      - key: JWT_SECRET
        sync: false
      - key: JWT_REFRESH_SECRET
        sync: false
      - key: SESSION_SECRET
        sync: false
      - key: REDIS_URL
        sync: false
      - key: RESEND_API_KEY
        sync: false
      - key: EMAIL_FROM
        value: Gyandeep <noreply@gyandeep.edu>
      - key: ADMIN_EMAIL
        value: admin@gyandeep.edu
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_SECRET
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: CLOUDINARY_CLOUD_NAME
        sync: false
      - key: CLOUDINARY_API_KEY
        sync: false
      - key: CLOUDINARY_API_SECRET
        sync: false
