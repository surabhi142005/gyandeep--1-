upstream gyandeep_backend {
    least_conn;
    
    server 127.0.0.1:3001 weight=5;
    server 127.0.0.1:3002 weight=4;
    server 127.0.0.1:3003 weight=3 backup;
}

upstream gyandeep_websocket {
    ip_hash;
    
    server 127.0.0.1:3001;
    server 127.0.0.1:3002;
}

server {
    listen 80;
    listen [::]:80;
    server_name gyandeep.edu api.gyandeep.edu;
    
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }
    
    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name gyandeep.edu;
    
    ssl_certificate /etc/letsencrypt/live/gyandeep.edu/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/gyandeep.edu/privkey.pem;
    ssl_trusted_certificate /etc/letsencrypt/live/gyandeep.edu/chain.pem;
    
    ssl_session_timeout 1d;
    ssl_session_cache shared:SSL:50m;
    ssl_session_tickets off;
    
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header X-Frame-Options DENY always;
    add_header X-Content-Type-Options nosniff always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    
    root /var/www/gyandeep/dist;
    index index.html;
    
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css text/xml application/json application/javascript application/rss+xml application/atom+xml image/svg+xml;
    
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }
    
    location / {
        try_files $uri $uri/ /index.html;
    }
    
    location /api/ {
        proxy_pass http://gyandeep_backend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }
    
    location /metrics {
        proxy_pass http://gyandeep_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        
        allow 10.0.0.0/8;
        allow 172.16.0.0/12;
        allow 192.168.0.0/16;
        deny all;
    }
    
    location /ws {
        proxy_pass http://gyandeep_websocket;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 86400;
    }
    
    location /storage {
        proxy_pass http://gyandeep_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        
        client_max_body_size 10M;
        proxy_request_buffering off;
    }
    
    location /health {
        proxy_pass http://gyandeep_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        
        access_log off;
    }
    
    error_page 500 502 503 504 /50x.html;
    location = /50x.html {
        root /var/www/gyandeep/dist;
    }
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name api.gyandeep.edu;
    
    ssl_certificate /etc/letsencrypt/live/api.gyandeep.edu/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api.gyandeep.edu/privkey.pem;
    
    ssl_session_timeout 1d;
    ssl_session_cache shared:SSL:50m;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256;
    ssl_prefer_server_ciphers off;
    
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header X-Frame-Options DENY always;
    add_header X-Content-Type-Options nosniff always;
    
    location / {
        proxy_pass http://gyandeep_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
    
    location /health {
        proxy_pass http://gyandeep_backend;
        proxy_http_version 1.1;
        access_log off;
    }
    
    location /metrics {
        proxy_pass http://gyandeep_backend;
        proxy_http_version 1.1;
        
        allow 10.0.0.0/8;
        allow 172.16.0.0/12;
        allow 192.168.0.0/16;
        deny all;
    }
}
