    <meta name="description" content="Gyandeep - AI-Powered Smart Classroom System" />
    <title>Gyandeep - AI Smart Classroom</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="preload" as="style" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" />

    <link rel="stylesheet" href="/styles/design-tokens.css" />
    
    <script>
      (function() {
        try {
          var theme = localStorage.getItem('gyandeep-theme') || 'cosmic-purple';
          document.documentElement.setAttribute('data-theme', theme);
          var darkRaw = localStorage.getItem('gyandeep-dark-mode');
          var dark = darkRaw ? JSON.parse(darkRaw) : false;
          document.documentElement.setAttribute('data-dark-mode', dark ? '1' : '0');
        } catch (e) {
          console.error('Failed to apply theme', e);
        }
      })();
    </script>
    <style>
      body {
        margin: 0;
        padding: env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
        background-color: var(--color-bg);
        color: var(--color-text);
        transition: background-color 300ms ease;
        overflow-x: hidden;
        -webkit-overflow-scrolling: touch;
      }
      #root {
        min-height: 100vh;
        min-height: 100dvh;
      }
      html {
        overscroll-behavior-y: contain;
      }
      .safe-area-top {
        padding-top: env(safe-area-inset-top);
      }
      .safe-area-bottom {
        padding-bottom: env(safe-area-inset-bottom);
      }
    </style>
  </head>
