<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/logo.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <meta name="description" content="Gyandeep - AI-Powered Smart Classroom System" />
    <title>Gyandeep - AI Smart Classroom</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
    
    <link rel="stylesheet" href="/styles/design-tokens.css" />
    
    <script>
      (function() {
        try {
          var theme = localStorage.getItem('gyandeep-theme') || 'cosmic-purple';
          document.documentElement.setAttribute('data-theme', theme);
          var darkRaw = localStorage.getItem('gyandeep-dark-mode');
          var dark = darkRaw ? JSON.parse(darkRaw) : false;
          document.documentElement.setAttribute('data-dark-mode', dark ? '1' : '0');
        } catch (e) {
          console.error('Failed to apply theme', e);
        }
      })();
    </script>
    <style>
      body {
        margin: 0;
        background-color: var(--color-bg);
        color: var(--color-text);
        transition: background-color 300ms ease;
        /* Prevent horizontal overflow on mobile */
        overflow-x: hidden;
        /* Smooth scrolling */
        -webkit-overflow-scrolling: touch;
      }
      #root {
        min-height: 100vh;
        min-height: 100dvh; /* Dynamic viewport height */
      }
      /* Prevent pull-to-refresh on mobile while allowing scroll */
      html {
        overscroll-behavior-y: contain;
      }
    </style>
  </head>
  <body class="antialiased">
    <div id="root"></div>
    <script type="module" src="/index.tsx"></script>
  </body>
</html>
